# Palvi frontend — nginx config for the prod container.
# Coolify/Caddy reverse-proxies the public domain to this container on port 80.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version on error pages / Server header.
    server_tokens off;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Vite hashes asset filenames → cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: any non-asset path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Keep index.html out of the long cache so SPA updates propagate.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
